---
- name: Add Grafana APT repository key
  apt_key:
    url: https://apt.grafana.com/gpg.key
    state: present

- name: Add Grafana APT repository
  apt_repository:
    repo: "deb https://apt.grafana.com stable main"
    state: present
    filename: grafana

- name: Install Grafana
  apt:
    name: "grafana={{ grafana_version }}"
    state: present
    update_cache: true

- name: Configure Grafana
  copy:
    dest: /etc/grafana/grafana.ini
    content: |
      [server]
      http_port = 3000
      domain = localhost

      [security]
      admin_user = admin
      admin_password = admin

      [users]
      allow_sign_up = false

      [dashboards]
      default_home_dashboard_path = /var/lib/grafana/dashboards/system-metrics.json
    mode: "0640"
    owner: root
    group: grafana

- name: Create Grafana dashboards directory
  file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"

- name: Copy system metrics dashboard
  copy:
    src: "{{ playbook_dir }}/../../grafana/dashboards/system-metrics.json"
    dest: /var/lib/grafana/dashboards/system-metrics.json
    owner: grafana
    group: grafana
    mode: "0644"

- name: Configure Grafana datasource (Prometheus)
  copy:
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://localhost:9090
          isDefault: true
          editable: false
    owner: root
    group: grafana
    mode: "0640"

- name: Configure Grafana dashboard provisioning
  copy:
    dest: /etc/grafana/provisioning/dashboards/default.yml
    content: |
      apiVersion: 1
      providers:
        - name: default
          type: file
          disableDeletion: false
          updateIntervalSeconds: 30
          options:
            path: /var/lib/grafana/dashboards
    owner: root
    group: grafana
    mode: "0640"

- name: Enable and start Grafana
  systemd:
    name: grafana-server
    enabled: true
    state: started
    daemon_reload: true
