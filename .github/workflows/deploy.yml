name: Deploy Cloud Monitoring Stack

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

env:
  TF_VERSION: "1.7.5"
  ANSIBLE_VERSION: "9.4.0"
  WORKING_DIR: terraform

jobs:
  # ─────────────────────────────────────────
  # 1. Terraform Validate & Plan
  # ─────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Write SSH public key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa.pub

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan -var="aws_region=${{ secrets.AWS_REGION }}"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

  # ─────────────────────────────────────────
  # 2. Terraform Apply
  # ─────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    outputs:
      public_ip: ${{ steps.tf-output.outputs.public_ip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Write SSH keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}"  > ~/.ssh/id_rsa.pub
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa ~/.ssh/id_rsa.pub

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform outputs
        id: tf-output
        run: |
          echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT
          echo "grafana_url=$(terraform output -raw grafana_url)" >> $GITHUB_OUTPUT
          echo "prometheus_url=$(terraform output -raw prometheus_url)" >> $GITHUB_OUTPUT

      - name: Print access URLs
        run: |
          echo "Grafana   : $(terraform output -raw grafana_url)"
          echo "Prometheus: $(terraform output -raw prometheus_url)"
          echo "SSH       : $(terraform output -raw ssh_command)"

  # ─────────────────────────────────────────
  # 3. Ansible Provisioning
  # ─────────────────────────────────────────
  ansible-deploy:
    name: Ansible Deploy
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible==${{ env.ANSIBLE_VERSION }}

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Wait for EC2 SSH to be ready
        run: |
          PUBLIC_IP="${{ needs.terraform-apply.outputs.public_ip }}"
          echo "Waiting for SSH on $PUBLIC_IP..."
          for i in $(seq 1 20); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i ~/.ssh/id_rsa ubuntu@$PUBLIC_IP "echo ready" && break
            echo "Attempt $i/20 failed, retrying in 15s..."
            sleep 15
          done

      - name: Generate Ansible inventory
        run: |
          PUBLIC_IP="${{ needs.terraform-apply.outputs.public_ip }}"
          cat > ansible/inventory/hosts.ini <<EOF
          [monitoring]
          $PUBLIC_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

          [monitoring:vars]
          ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      - name: Run Ansible playbook
        run: |
          ansible-playbook \
            -i ansible/inventory/hosts.ini \
            ansible/playbooks/monitoring.yml \
            -v

      - name: Print final URLs
        run: |
          PUBLIC_IP="${{ needs.terraform-apply.outputs.public_ip }}"
          echo "Grafana   : http://$PUBLIC_IP:3000 (admin/admin)"
          echo "Prometheus: http://$PUBLIC_IP:9090"
